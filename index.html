<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zurich Classic Pro | Master DB & Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b; --bg-surface: #18181b; --bg-card: #27272a; --border-subtle: #3f3f46;
            --text-primary: #f4f4f5; --text-secondary: #a1a1aa; --text-muted: #71717a;
            --accent-blue: #3b82f6; --accent-blue-glow: rgba(59, 130, 246, 0.15);
            --accent-green: #10b981; --accent-green-bg: rgba(16, 185, 129, 0.15);
            --accent-red: #ef4444; --accent-red-bg: rgba(239, 68, 68, 0.15);
            --radius-md: 12px; --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; line-height: 1.6; }

        header {
            background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle);
            padding: 20px 24px; position: sticky; top: 0; z-index: 100;
        }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        nav { max-width: 1400px; margin: 24px auto 0; padding: 0 24px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        .tab { background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-secondary); padding: 10px 20px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .tab.active { background: var(--accent-blue-glow); color: var(--accent-blue); border-color: var(--accent-blue); }

        main { max-width: 1400px; margin: 24px auto 40px; padding: 0 24px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Cards & Inputs --- */
        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 900px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
        .card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 24px; }
        
        .form-group { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border-subtle); padding-bottom: 12px;}
        .form-group label { font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .form-group select, .form-group input[type="checkbox"] { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-subtle); padding: 8px; border-radius: 8px; outline: none; }
        
        .btn { display: block; width: 100%; padding: 16px; background: var(--accent-blue); color: #fff; font-weight: 800; text-align: center; border: none; border-radius: var(--radius-md); cursor: pointer; transition: 0.2s; margin-top: 24px;}
        .btn:active { transform: scale(0.98); }

        /* --- Table Styling --- */
        .table-container { overflow-x: auto; background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
        th { background: var(--bg-card); color: var(--text-secondary); font-weight: 600; cursor: pointer; position: sticky; top: 0; }
        td { color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
        .badge-high { color: var(--accent-red); background: var(--accent-red-bg); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: 'Inter', sans-serif;}
        .badge-low { color: var(--accent-green); background: var(--accent-green-bg); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: 'Inter', sans-serif;}

        /* --- Lineup Styling --- */
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed var(--border-subtle); }
        .player-name { font-weight: 600; font-size: 15px; font-family: 'Inter', sans-serif; }
        .player-meta { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .player-salary { font-weight: 700; color: var(--accent-green); font-size: 16px;}
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Zurich DFS Terminal</h1>
            <div style="color:var(--text-secondary); font-size:12px; font-weight:600;">DB & OPTIMIZER LOADED</div>
        </div>
    </header>

    <nav>
        <button class="tab active" onclick="switchTab('db')">1. Master Player DB</button>
        <button class="tab" onclick="switchTab('optimizer')">2. Live Optimizer</button>
    </nav>

    <main>
        <section id="db" class="section active">
            <h2 style="margin-bottom: 16px;">Zurich Classic 74-Team Field</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th onclick="renderTable('sal')">Team / Salary ↕</th>
                            <th onclick="renderTable('odds')">Win Odds ↕</th>
                            <th onclick="renderTable('win_eq')">Win Eq % ↕</th>
                            <th onclick="renderTable('syn')">Foursomes Syn ↕</th>
                            <th onclick="renderTable('steam')">Live Steam ↕</th>
                            <th onclick="renderTable('app_rank')">APP Rank ↕</th>
                            <th onclick="renderTable('buzz')">Tout Buzz ↕</th>
                        </tr>
                    </thead>
                    <tbody id="db-body">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="optimizer" class="section">
            <div class="grid-2">
                <div class="card">
                    <h2 style="margin-bottom: 24px;">GPP Constraints</h2>
                    
                    <div class="form-group">
                        <label>Max High-Buzz Teams (Leverage)</label>
                        <select id="opt-chalk">
                            <option value="6">Unlimited (Cash/Small Field)</option>
                            <option value="2" selected>Max 2 (GPP Optimal)</option>
                            <option value="1">Max 1 (Milly Maker)</option>
                            <option value="0">Zero Chalk</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Min Longshots (> +3500 Odds)</label>
                        <select id="opt-long">
                            <option value="0">None Required</option>
                            <option value="1" selected>Min 1 Team</option>
                            <option value="2">Min 2 Teams</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Avoid Swamp Traps (Synergy < 0)</label>
                        <input type="checkbox" id="opt-traps" checked>
                    </div>

                    <div class="form-group">
                        <label>Boost Top 15 SG: Approach Teams</label>
                        <input type="checkbox" id="opt-app" checked>
                    </div>

                    <button class="btn" onclick="runOptimizer()">GENERATE OPTIMAL LINEUP</button>
                </div>

                <div class="card" id="opt-output">
                    <div style="height: 100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); text-align:center;">
                        Configure constraints and run optimizer to generate a mathematically perfect lineup.
                    </div>
                </div>
            </div>
        </section>
    </main>

        let currentSort = 'sal';
        let sortAsc = false;

        // UI Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Table Render Logic
        function renderTable(sortKey = currentSort) {
            if (sortKey === currentSort) sortAsc = !sortAsc;
            else sortAsc = false;
            currentSort = sortKey;

            const sortedDB = [...MASTER_DB].sort((a, b) => {
                let valA = a[sortKey]; let valB = b[sortKey];
                if (sortKey === 'team' || sortKey === 'buzz') { return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA); }
                return sortAsc ? valA - valB : valB - valA;
            });

            const tbody = document.getElementById('db-body');
            tbody.innerHTML = sortedDB.map(t => {
                const buzzClass = t.buzz === 'High' ? 'badge-high' : 'badge-low';
                const stmColor = t.steam > 0 ? 'var(--accent-green)' : (t.steam < 0 ? 'var(--accent-red)' : 'var(--text-muted)');
                const synColor = t.syn < 0 ? 'var(--accent-red)' : 'var(--accent-green)';
                return `
                    <tr>
                        <td>
                            <div style="font-family:'Inter', sans-serif; font-weight:600;">${t.team}</div>
                            <div style="color:var(--accent-green); font-size:12px;">$${t.sal}</div>
                        </td>
                        <td>+${t.odds}</td>
                        <td>${t.win_eq}%</td>
                        <td style="color:${synColor}; font-weight:700;">${t.syn > 0 ? '+' : ''}${t.syn}</td>
                        <td style="color:${stmColor}; font-weight:700;">${t.steam > 0 ? '+' : ''}${t.steam}%</td>
                        <td>#${t.app_rank}</td>
                        <td><span class="${buzzClass}">${t.buzz.toUpperCase()}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // --- DYNAMIC KNAPSACK OPTIMIZER ---
        function runOptimizer() {
            // 1. Gather User Constraints
            const maxChalk = parseInt(document.getElementById('opt-chalk').value);
            const minLongshots = parseInt(document.getElementById('opt-long').value);
            const avoidTraps = document.getElementById('opt-traps').checked;
            const boostApp = document.getElementById('opt-app').checked;

            const maxSal = 50000, minSal = 49000; // Force salary utilization to avoid duplicate lineups

            // 2. Pre-process Items & Map Objective Function
            const items = MASTER_DB.map(p => {
                // Base GPP Expected Value: Foursomes Survival * Best Ball Ceiling
                let obj = (p.cut_prob / 100) * (p.pred + (p.syn * 2.0) + (1.645 * p.std));
                
                // Penalties & Boosts
                if (avoidTraps && p.syn < 0) obj = -9999;
                if (boostApp && p.app_rank <= 15) obj += 2.0;

                return {
                    ...p,
                    w: Math.floor(p.sal / 100),
                    v: obj,
                    isChalk: p.buzz === 'High' ? 1 : 0,
                    isLongshot: p.odds >= 3500 ? 1 : 0
                };
            }).filter(p => p.v > -5000); // Strip impossible configurations

            // 3. 4D Dynamic Programming Initialization [Count]_[Salary]_[Longshots]_[Chalk]
            let dp = { '0_0_0_0': { val: 0, line: [] } }; 

            // 4. Knapsack Execution
            for (let it of items) {
                let nextDp = { ...dp };
                for (let key in dp) {
                    let parts = key.split('_');
                    let c = parseInt(parts[0]), s = parseInt(parts[1]), l = parseInt(parts[2]), k = parseInt(parts[3]);

                    if (c < 6 && (s + it.w <= (maxSal/100)) && (k + it.isChalk <= maxChalk)) {
                        let nl = Math.min(l + it.isLongshot, minLongshots); // Cap tracking to req
                        let nk = k + it.isChalk;
                        let nKey = `${c+1}_${s+it.w}_${nl}_${nk}`;
                        let nVal = dp[key].val + it.v;

                        if (!nextDp[nKey] || nextDp[nKey].val < nVal) {
                            nextDp[nKey] = { val: nVal, line: [...dp[key].line, it] };
                        }
                    }
                }
                dp = nextDp;
            }

            // 5. Find Optimal Result Meeting Constraints
            let bestVal = -1;
            let bestLine = null;
            for (let key in dp) {
                let parts = key.split('_');
                let c = parseInt(parts[0]), s = parseInt(parts[1]), l = parseInt(parts[2]);
                if (c === 6 && (s >= minSal/100) && l >= minLongshots) {
                    if (dp[key].val > bestVal) {
                        bestVal = dp[key].val;
                        bestLine = dp[key].line;
                    }
                }
            }

            // 6. Render Output
            const outDiv = document.getElementById('opt-output');
            if (bestLine) {
                const totalSal = bestLine.reduce((sum, t) => sum + t.sal, 0);
                const totalWin = bestLine.reduce((sum, t) => sum + t.win_eq, 0).toFixed(2);
                
                let html = `
                    <div style="display:flex; justify-content:space-between; align-items:end; margin-bottom:20px; border-bottom:1px solid var(--border-subtle); padding-bottom:16px;">
                        <div>
                            <div style="font-size:12px; color:var(--text-secondary); text-transform:uppercase;">Optimal Construction</div>
                            <div style="font-size:24px; font-weight:800; color:var(--accent-blue);">${totalWin}% Win Eq</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:12px; color:var(--text-secondary); text-transform:uppercase;">Total Salary</div>
                            <div style="font-size:24px; font-weight:800; color:var(--accent-green);">$${totalSal}</div>
                        </div>
                    </div>
                `;

                bestLine.sort((a,b) => b.sal - a.sal).forEach(t => {
                    const buzz = t.buzz === 'High' ? '<span style="color:var(--accent-red); margin-left:6px; font-size:10px;">⚠️ CHALK</span>' : '';
                    html += `
                        <div class="player-row">
                            <div>
                                <div class="player-name">${t.team} ${buzz}</div>
                                <div class="player-meta">Odds: +${t.odds} | SG App: #${t.app_rank} | Foursomes Fit: ${t.syn > 0 ? '+' : ''}${t.syn}</div>
                            </div>
                            <div class="player-salary">$${t.sal}</div>
                        </div>
                    `;
                });
                outDiv.innerHTML = html;
            } else {
                outDiv.innerHTML = `<div style="color:var(--accent-red); text-align:center; padding:40px 20px; font-weight:600;">No mathematically valid lineup exists under these constraints. Please loosen the rules.</div>`;
            }
        }

        // Initialize
        renderTable();
